<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Budget Tracker</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 900px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
  color: #38bdf8;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

input, select {
  padding: 10px;
  margin: 5px 0;
  width: 100%;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  border: none;
  padding: 12px;
  width: 100%;
  border-radius: 8px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #16a34a;
}

.expense {
  display: flex;
  justify-content: space-between;
  background: #334155;
  padding: 10px;
  border-radius: 8px;
  margin-top: 8px;
}

.total {
  text-align: center;
  font-size: 20px;
  margin-top: 10px;
  color: #facc15;
}
</style>
</head>

<body>

<div class="container">

<h1>💰 Team Budget Tracker</h1>

<div class="card">
  <h3>Add Expense</h3>
  
  <input type="number" id="amount" placeholder="Enter amount">
  
  <select id="category">
    <option>Food</option>
    <option>Travel</option>
    <option>Bills</option>
    <option>Shopping</option>
    <option>Other</option>
  </select>
  
  <button onclick="addExpense()">Add Expense</button>
</div>

<div class="card">
  <h3>Expenses</h3>
  <div id="expenseList"></div>
  <div class="total" id="total">Total: ₹0</div>
</div>

<div class="card">
  <h3>Spending Breakdown</h3>
  <canvas id="chart"></canvas>
</div>

</div>

<script>
let expenses = [];

function addExpense() {
  const amount = document.getElementById("amount").value;
  const category = document.getElementById("category").value;

  if (!amount) {
    alert("Enter amount!");
    return;
  }

  const expense = {
    amount: Number(amount),
    category: category
  };

  expenses.push(expense);

  updateUI();
}

function updateUI() {
  const list = document.getElementById("expenseList");
  list.innerHTML = "";

  let total = 0;

  expenses.forEach(e => {
    total += e.amount;

    const div = document.createElement("div");
    div.className = "expense";
    div.innerHTML = `<span>${e.category}</span><span>₹${e.amount}</span>`;
    list.appendChild(div);
  });

  document.getElementById("total").innerText = "Total: ₹" + total;

  updateChart();
}

let chart;

function updateChart() {
  const dataMap = {};

  expenses.forEach(e => {
    dataMap[e.category] = (dataMap[e.category] || 0) + e.amount;
  });

  const labels = Object.keys(dataMap);
  const data = Object.values(dataMap);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: 'pie',
    data: {
      labels: labels,
      datasets: [{
        data: data
      }]
    }
  });
}
</script>

</body>
</html>
